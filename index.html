<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>

<body>


    <div class="container">
        <div class="box-calculadora">
        <section id="visor"></section>

        <div class="box-button">
            
            <button value="C" id="limpar">C</button>
            <button id="parenteses">()</button>
            <button value="%" id="porcentagem">%</button>
            <button value="/" id="dividir">/</button>

            <button value="7" id="sete">7</button>
            <button value="8" id="oito">8</button>
            <button value="9" id="nove">9</button>
            <button value="*" id="multiplicação">X</button>

            <button value="4" id="quatro">4</button>
            <button value="5" id="cinco">5</button>
            <button value="6" id="seis">6</button>
            <button value="-" id="menos">-</button>

            <button value="1" id="um">1</button>
            <button value="2" id="dois">2</button>
            <button value="3" id="tres">3</button>
            <button value="+" id="mai">+</button>

            <button value="0" id="zero">0</button>
            <button value="=" id="igual">=</button>
            
        </div>
</div>
    </div>
</body>

</html>
